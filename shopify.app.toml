[app_proxy]
url = "/api/proxy"
subpath = "booking"
prefix = "apps"

[auth]
redirect_urls = [
  "https://drums-edward-lobby-flags.trycloudflare.com/auth/callback",
  "https://drums-edward-lobby-flags.trycloudflare.com/auth/shopify/callback",
  "https://drums-edward-lobby-flags.trycloudflare.com/auth/google/callback",
  "https://drums-edward-lobby-flags.trycloudflare.com/auth/zoom/callback",
]

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[build]
automatically_update_urls_on_dev = true
