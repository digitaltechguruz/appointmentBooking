services:
  postgres:
    image: postgres:16-alpine
    container_name: appointment-booking-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bookingapp
      POSTGRES_PASSWORD: bookingapp
      POSTGRES_DB: appointment_booking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookingapp -d appointment_booking"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
